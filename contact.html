<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLE College - Contact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #333; }

    header {
      background: #003366;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.6rem; }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 1rem;
    }
    nav a:hover { text-decoration: underline; }

    .contact-wrapper {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 60px 40px;
      flex-wrap: wrap;
      background: #f5f5f5;
      min-height: calc(100vh - 130px);
    }

    .info-box {
      background: white;
      border-radius: 8px;
      padding: 30px;
      width: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .info-box h2 { color: #003366; margin-bottom: 20px; }
    .info-item { margin-bottom: 16px; font-size: 0.95rem; }
    .info-item span { font-weight: bold; display: block; color: #003366; }

    form {
      background: white;
      border-radius: 8px;
      padding: 30px;
      width: 380px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    form h2 { color: #003366; margin-bottom: 20px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: bold; }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    textarea { height: 110px; resize: vertical; }
    button {
      background: #003366;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
    }
    button:hover { background: #0055aa; }

    footer {
      background: #003366;
      color: #ccc;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎓 KLE College</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="contact-wrapper">

    <div class="info-box">
      <h2>Contact Info</h2>
      <div class="info-item">
        <span>📍 Address</span>
        KLE College Campus, Belgaum, Karnataka - 590001
      </div>
      <div class="info-item">
        <span>📞 Phone</span>
        +91 831 000 0000
      </div>
      <div class="info-item">
        <span>✉️ Email</span>
        info@klecollege.edu.in
      </div>
      <div class="info-item">
        <span>🕘 Office Hours</span>
        Mon – Sat: 9:00 AM – 5:00 PM
      </div>
    </div>

    <form onsubmit="handleSubmit(event)">
      <h2>Send a Message</h2>
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Your name" required />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" required />

      <label for="message">Message</label>
      <textarea id="message" placeholder="Write your message..." required></textarea>

      <button type="submit">Send Message</button>
    </form>

  </div>

  <footer>
    <p>&copy; 2025 KLE College. All rights reserved.</p>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      alert('Thank you! Your message has been sent.');
      e.target.reset();
    }
  </script>

</body>
</html>
